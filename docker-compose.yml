version: "3.9"
services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: [ "gateway", "run" ]
    env_file:
      - .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}

      HERMES_UID: "10010"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${API_SERVER_KEY:?Set API_SERVER_KEY in .env}

      HERMES_DASHBOARD: "0"

    volumes:
      - hermes-agent-data:/opt/data

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8642/health && curl -fsS http://127.0.0.1:9119/api/status || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    ports:
      - "127.0.0.1:8642:8642"

    networks:
      - hermes-internal

  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    container_name: hermes-workspace
    restart: unless-stopped
    depends_on:
      hermes-agent:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: "production"
      HERMES_HOME: "/home/workspace/.hermes"
      HERMES_WORKSPACE_DIR: "/workspace"

      # Internal Docker network endpoints
      HERMES_API_URL: "http://hermes-agent:8642"
      #HERMES_DASHBOARD_URL: "http://hermes-agent:9119"

      # Must match API_SERVER_KEY above
      HERMES_API_TOKEN: ${API_SERVER_KEY:?Set API_SERVER_KEY in .env}

      # Required when accessed remotely
      HERMES_PASSWORD: ${HERMES_PASSWORD:-${CLAUDE_PASSWORD:-}}

      # Recommended when terminating HTTPS at Tailscale Serve / reverse proxy
      COOKIE_SECURE: ${COOKIE_SECURE:-}

      # Trust the proxy in front so forwarded headers are classified correctly
      TRUST_PROXY: ${TRUST_PROXY:-}

    volumes:
      - hermes-agent-data:/home/workspace/.hermes
      - hermes-workspace-files:/workspace

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    ports:
      - "127.0.0.1:3000:3000"

    networks:
      - hermes-internal

volumes:
  hermes-agent-data:
  hermes-workspace-files:

networks:
  hermes-internal:
    driver: bridge
